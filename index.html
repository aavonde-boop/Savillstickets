    function App() {

        toastTimer.current = setTimeout(()=>setToast(null), 3500);

      // ─── CHARGEMENT INITIAL DEPUIS SUPABASE (après login) ───
      useEffect(function() {
        if (!unlocked) return;
        if (!sb) { setDbStatus("error"); setDbMsg("SDK Supabase non disponible"); return; }
        async function loadAll() {
          setDbStatus("loading");
          try {
            const [tkRes, prRes, reRes, deRes, hiRes, phRes] = await Promise.all([
              sb.from("tickets").select("*").order("id"),
              sb.from("prestataires").select("*").order("id"),
              sb.from("reunions").select("*").order("id"),
              sb.from("decisions").select("*").order("id"),
              sb.from("historique").select("*").order("id"),
              sb.from("photos").select("*").order("id"),
            ]);
            if (tkRes.error) throw tkRes.error;
            // Si la table tickets est vide, on insère les données initiales
            if (tkRes.data && tkRes.data.length === 0) {
              await seedInitialData();
              return loadAll();
            }
            setTickets(tkRes.data || INIT_TICKETS);
            setPresta(prRes.data && prRes.data.length > 0 ? prRes.data : INIT_PRESTA);
            setReunions(reRes.data || INIT_REUNIONS);
            setDecisions(deRes.data || INIT_DECISIONS);
            setHisto(hiRes.data || INIT_HISTO);
            setPhotos(phRes.data || []);
            setDbStatus("ok");
          } catch(e) {
            console.error("Erreur chargement Supabase:", e);
            setDbStatus("error");
            setDbMsg(e.message || "Erreur connexion");
          }

        loadAll();

        try {

          await sb.from("decisions").insert(INIT_DECISIONS.map(d=>({...d})));
          await sb.from("historique").insert(INIT_HISTO.map(h=>({...h})));
        } catch(e) { console.error("Erreur seed:", e); }
      }

      async function sbUpsert(table, row) {
        if (!sb) return;
        setDbStatus("saving");
        const { error } = await sb.from(table).upsert(row);
        if (error) { console.error("Erreur upsert "+table+":", error); setDbStatus("error"); setDbMsg(error.message); showToast("❌ Erreur sauvegarde : "+error.message, "error"); }
        else { setDbStatus("ok"); showToast("✅ Sauvegarde réussie", "ok"); }
      }
      async function sbDelete(table, id) {
        if (!sb) return;
        setDbStatus("saving");
        const { error } = await sb.from(table).delete().eq("id", id);
        if (error) { console.error("Erreur delete "+table+":", error); setDbStatus("error"); setDbMsg(error.message); showToast("❌ Erreur suppression : "+error.message, "error"); }
        else { setDbStatus("ok"); showToast("🗑️ Suppression effectuée", "ok"); }
      }
      async function sbInsert(table, row) {
        if (!sb) return null;

          reader.onload=ev=>{
            onAddPhotos({id:Date.now()+"_"+Math.random().toString(36).slice(2),ticket_id:t.id,nom:file.name,date:new Date().toISOString().slice(0,10),data:ev.target.result});

    function VuePlanning({tickets,reunions,presta,onSelectTicket}){
      const now = new Date(); now.setHours(0,0,0,0);
      const [horizon,setHorizon] = useState(30);

      const tN = new Date(now); tN.setDate(tN.getDate()+horizon);

      const upcoming=[];
      tickets.filter(t=>t.statut!=="Clos"&&t.echeance).forEach(t=>{
        const d=new Date(t.echeance+"T00:00:00");
        if(d>=now&&d<=tN) upcoming.push({date:t.echeance,type:"Échéance",label:"#"+t.id+" — "+t.description,color:PRIO_C[t.priorite]||C.blue,badgeBg:PRIO_C[t.priorite]+"22",ticket:t,prio:t.priorite});
      });
      tickets.filter(t=>t.statut!=="Clos"&&t.engagement_prestataire).forEach(t=>{
        const pr=presta.find(x=>x.id===t.prestataire_id);
        const d=new Date(t.engagement_prestataire+"T00:00:00");
        if(d>=now&&d<=tN) upcoming.push({date:t.engagement_prestataire,type:"Engagement",label:"#"+t.id+" — "+t.description+(pr?" ("+pr.nom+")":""),color:"#7C3AED",badgeBg:"#F5F3FF",ticket:t});
      });
      reunions.forEach(r=>{
        const d=new Date(r.date+"T00:00:00");
        const pr=presta.find(x=>x.id===r.prestataire_id);
        if(d>=now&&d<=tN) upcoming.push({date:r.date,type:"Réunion",label:"Réunion "+(pr?pr.nom:""),color:C.orange,badgeBg:"#FFF7ED"});
      });
      upcoming.sort((a,b)=>a.date.localeCompare(b.date));

      // Grouper par date
      const grouped={};
      upcoming.forEach(ev=>{
        if(!grouped[ev.date]) grouped[ev.date]=[];
        grouped[ev.date].push(ev);
      });
      const dates=Object.keys(grouped).sort();

      const TYPE_C={"Échéance":C.red,"Engagement":"#7C3AED","Réunion":C.orange};
      const TYPE_BG={"Échéance":"#FEF2F2","Engagement":"#F5F3FF","Réunion":"#FFF7ED"};

      return React.createElement("div",null,
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}},
          React.createElement("h1",{style:{fontSize:22,fontWeight:700,color:"#0891B2"}},"\u{1F4C5} Prochains événements"),
          React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            React.createElement("span",{style:{fontSize:13,color:"#6B7280"}},"Horizon :"),
            [7,14,30,60,90].map(h=>React.createElement("button",{key:h,onClick:()=>setHorizon(h),
              style:{background:horizon===h?"#0891B2":"#fff",color:horizon===h?"#fff":"#374151",border:"1px solid "+(horizon===h?"#0891B2":"#D1D5DB"),borderRadius:6,padding:"4px 12px",fontSize:12,fontWeight:600,cursor:"pointer"}},
              h+"j"
            ))
          )
        ),
        upcoming.length===0 && React.createElement(Card,{style:{textAlign:"center",padding:48,color:"#9CA3AF"}},
          React.createElement("div",{style:{fontSize:32,marginBottom:8}},"\u{1F4C5}"),
          React.createElement("div",{style:{fontSize:15,fontWeight:500}},"Aucun événement dans les "+horizon+" prochains jours"),
          React.createElement("div",{style:{fontSize:13,marginTop:4}},"Ajoutez des échéances sur vos tickets ou planifiez des réunions.")
        ),
        dates.length>0 && React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
          dates.map(date=>{
            const evs=grouped[date];
            const d=new Date(date+"T00:00:00");
            const diff=Math.round((d-now)/86400000);
            const isToday=diff===0; const isTomorrow=diff===1;
            const dayLabel=isToday?"Aujourd'hui":isTomorrow?"Demain":d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long"});
            return React.createElement("div",{key:date},
              React.createElement("div",{style:{display:"flex",alignItems:"center",gap:10,marginBottom:6}},
                React.createElement("div",{style:{fontWeight:600,fontSize:13,color:isToday?"#DC2626":diff<=3?"#B45309":"#374151"}},dayLabel),
                diff>0 && React.createElement("div",{style:{fontSize:11,color:"#9CA3AF"}},"dans "+diff+" jour"+(diff>1?"s":"")),
                React.createElement("div",{style:{flex:1,height:"1px",background:"#E5E7EB"}})
              ),
              React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:6}},
                evs.map((ev,i)=>React.createElement("div",{key:i,
                  onClick:ev.ticket?()=>onSelectTicket(ev.ticket):undefined,
                  style:{display:"flex",alignItems:"center",gap:12,background:"#fff",border:"0.5px solid #E5E7EB",borderLeft:"4px solid "+ev.color,borderRadius:8,padding:"10px 14px",cursor:ev.ticket?"pointer":"default"}},
                  React.createElement("div",{style:{background:TYPE_BG[ev.type],color:TYPE_C[ev.type],fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4,whiteSpace:"nowrap"}},ev.type),
                  React.createElement("div",{style:{flex:1,fontSize:13,color:"#1F2937",fontWeight:500}},ev.label),
                  ev.prio && React.createElement("div",{style:{background:PRIO_C[ev.prio]+"22",color:PRIO_C[ev.prio],fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:4}},ev.prio)
                ))
              )
            );
          })
        )
      );
    }

    // ═══════════════════════════════════════
    // VUE RELANCES & NOTIFICATIONS
    // ═══════════════════════════════════════
    function VueRelances({tickets,presta,onSelectTicket,onUpdate}){
      const today0 = new Date(); today0.setHours(0,0,0,0);

      const diffDays = (dateStr) => {
        if(!dateStr) return null;
        const d=new Date(dateStr+"T00:00:00");
        return Math.round((today0-d)/86400000);
      };

      // Catégories d'alertes
      const enRetard = tickets.filter(t=>t.statut!=="Clos"&&t.echeance&&new Date(t.echeance+"T00:00:00")<today0);
      const sansRelance = tickets.filter(t=>{
        if(t.statut==="Clos") return false;
        const ref=t.derniere_relance||t.date_creation;
        return ref&&diffDays(ref)>14;
      });
      const echeanceProche = tickets.filter(t=>{
        if(t.statut==="Clos") return false;
        if(!t.echeance) return false;
        const d=new Date(t.echeance+"T00:00:00");
        const diff=Math.round((d-today0)/86400000);
        return diff>=0&&diff<=7;
      });
      const sansPrestOuEcheance = tickets.filter(t=>t.statut!=="Clos"&&(!t.echeance||!t.prestataire_id));

      const Section=({title,color,icon,items,renderItem})=>{
        if(items.length===0) return React.createElement(Card,{style:{borderLeft:"4px solid "+color,marginBottom:16,opacity:0.6}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
            React.createElement("span",{style:{fontSize:18}},icon),
            React.createElement("span",{style:{fontWeight:600,color}},"✅ "+title+" — Aucun ticket"),
          )
        );
        return React.createElement(Card,{style:{borderLeft:"4px solid "+color,marginBottom:16}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:12}},
            React.createElement("span",{style:{fontSize:20}},icon),
            React.createElement("h3",{style:{fontWeight:700,color,fontSize:15}},title),
            React.createElement("span",{style:{background:color,color:"#fff",borderRadius:999,fontSize:11,fontWeight:700,padding:"2px 8px"}},items.length)
          ),
          items.map((t,i)=>React.createElement("div",{key:t.id,
            style:{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",background:i%2===0?"#F9FAFB":"#fff",borderRadius:8,marginBottom:6,cursor:"pointer",border:"1px solid #E5E7EB"},
            onClick:()=>onSelectTicket(t)},
            React.createElement("div",null,
              React.createElement("div",{style:{fontWeight:600,fontSize:13,color:"#1F2937"}},"#"+t.id+" — "+t.description),
              React.createElement("div",{style:{fontSize:12,color:"#6B7280",marginTop:2}},renderItem(t))
            ),
            React.createElement("div",{style:{display:"flex",gap:6,alignItems:"center"}},
              React.createElement(PBadge,{p:t.priorite}),
              React.createElement("span",{style:{fontSize:11,color:"#9CA3AF"}},presta.find(x=>x.id===t.prestataire_id)?.nom||"—")
            )
          ))
        );
      };

      const marquerRelance=(t,e)=>{
        e.stopPropagation();
        const today=new Date().toISOString().slice(0,10);
        onUpdate(t.id,{derniere_relance:today});
      };

      const relanceMailDep = tickets.filter(t=>t.statut!=="Clos"&&isRelanceDepassee(t));

      return React.createElement("div",null,
        React.createElement("h1",{style:{fontSize:22,fontWeight:700,color:C.red,marginBottom:4}},"\uD83D\uDD14 Relances & Notifications"),
        React.createElement("p",{style:{color:"#6B7280",fontSize:13,marginBottom:20}},"Tableau de bord des tickets nécessitant une action. Cliquez sur un ticket pour ouvrir sa fiche."),

        // Résumé
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:24}},
          React.createElement(KPI,{label:"En retard",value:enRetard.length,color:C.red}),
          React.createElement(KPI,{label:"Relance J+7 dépassée",value:relanceMailDep.length,color:"#DC2626"}),
          React.createElement(KPI,{label:"Sans relance +14j",value:sansRelance.length,color:C.orange}),
          React.createElement(KPI,{label:"Échéance dans 7j",value:echeanceProche.length,color:"#0891B2"}),
          React.createElement(KPI,{label:"Infos manquantes",value:sansPrestOuEcheance.length,color:C.gray})
        ),

        React.createElement(Section,{title:"🔴 Relances mail J+7 dépassées",color:"#DC2626",icon:"📧",items:relanceMailDep,
          renderItem:t=>{const r=relanceJ7(t);return "Relance attendue le "+fmt(r)+" — "+Math.round((new Date()-new Date(r+"T00:00:00"))/86400000)+" jour(s) de retard";}}),

        React.createElement(Section,{title:"Tickets en retard",color:C.red,icon:"🚨",items:enRetard,
          renderItem:t=>"Échéance dépassée de "+Math.abs(Math.round((new Date(t.echeance+"T00:00:00")-today0)/86400000))+" jour(s) · Statut : "+t.statut}),

        React.createElement(Section,{title:"Échéance dans moins de 7 jours",color:"#0891B2",icon:"⏰",items:echeanceProche,
          renderItem:t=>{const diff=Math.round((new Date(t.echeance+"T00:00:00")-today0)/86400000);return "Dans "+diff+" jour(s) — "+fmt(t.echeance);}}),

        React.createElement(Section,{title:"Sans relance depuis plus de 14 jours",color:C.orange,icon:"📭",items:sansRelance,
          renderItem:t=>{const ref=t.derniere_relance||t.date_creation;return "Dernière action il y a "+diffDays(ref)+" jour(s)"+(t.derniere_relance?" (relance "+fmt(t.derniere_relance)+")":" (création "+fmt(t.date_creation)+")");}
        }),

        React.createElement(Section,{title:"Informations manquantes",color:C.gray,icon:"⚠️",items:sansPrestOuEcheance,
          renderItem:t=>(!t.echeance&&!t.prestataire_id?"Pas d'échéance ni de prestataire":!t.echeance?"Pas d'échéance définie":"Pas de prestataire assigné")})
      );
    }

    // ─── RENDU ───
    try {
      var root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(React.createElement(App));
    } catch(e) {
      document.getElementById("root").innerHTML = '<div style="padding:40px;font-family:monospace"><h2 style="color:red">Erreur</h2><pre>'+e.message+'</pre></div>';
    }
  </script>
</body>
</html>
